<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00CECE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="penGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#ede6ff;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="#0F0F12" />
  <rect x="2" y="2" width="44" height="44" rx="12" stroke="url(#mainGrad)" stroke-width="1.5" fill="none" opacity="0.4" />
  
  <!-- Manga panel frame (speech bubble / comic frame) -->
  <g filter="url(#glow)">
    <!-- Comic panel outer frame -->
    <rect x="10" y="9" width="28" height="24" rx="3" stroke="url(#mainGrad)" stroke-width="2" fill="none" opacity="0.6" />
    <!-- Inner panel divider -->
    <line x1="24" y1="9" x2="24" y2="33" stroke="url(#mainGrad)" stroke-width="1.2" opacity="0.3" />
    <line x1="10" y1="21" x2="38" y2="21" stroke="url(#mainGrad)" stroke-width="1.2" opacity="0.3" />
  </g>
  
  <!-- Stylized pen nib -->
  <g filter="url(#glow)">
    <path d="M28 18 L36 38 L32 38 L30 32 L26 32 L24 38 L20 38 L28 18Z" fill="url(#mainGrad)" opacity="0.9" />
    <!-- Pen tip highlight -->
    <path d="M28 22 L31 32 L25 32 Z" fill="url(#penGrad)" opacity="0.3" />
  </g>
  
  <!-- Small sparkle accent -->
  <circle cx="16" cy="15" r="1.5" fill="#00CECE" opacity="0.8" />
  <circle cx="33" cy="13" r="1" fill="#6C5CE7" opacity="0.6" />
</svg>