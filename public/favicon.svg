<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CECE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inkDrop" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7CF0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nibGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00CECE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A5A5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="1" y="1" width="46" height="46" rx="14" fill="#0F0F12" />
  <rect x="1" y="1" width="46" height="46" rx="14" stroke="url(#logoGrad)" stroke-width="1.5" fill="none" opacity="0.35" />
  
  <!-- Ink drop shape — stylized teardrop -->
  <g filter="url(#glow)">
    <path d="M24 8 C24 8, 14 20, 14 27 C14 32.5 18.5 37 24 37 C29.5 37 34 32.5 34 27 C34 20 24 8 24 8Z" fill="url(#inkDrop)" opacity="0.9" />
    <!-- Inner highlight reflection -->
    <ellipse cx="20" cy="24" rx="3.5" ry="5" fill="white" opacity="0.1" transform="rotate(-15 20 24)" />
  </g>
  
  <!-- Pen nib tip at top of drop -->
  <g filter="url(#glow)">
    <path d="M24 6 L27 14 L24 12.5 L21 14 Z" fill="url(#nibGrad)" opacity="0.95" />
  </g>
  
  <!-- Manga panel lines inside the drop — suggests publishing -->
  <line x1="18" y1="26" x2="30" y2="26" stroke="white" stroke-width="0.6" opacity="0.15" />
  <line x1="24" y1="22" x2="24" y2="33" stroke="white" stroke-width="0.6" opacity="0.12" />
  
  <!-- Small sparkle accents -->
  <circle cx="31" cy="15" r="1.2" fill="#00CECE" opacity="0.7" />
  <circle cx="15" cy="18" r="0.8" fill="#6C5CE7" opacity="0.5" />
  <circle cx="29" cy="33" r="0.7" fill="#00CECE" opacity="0.4" />
</svg>